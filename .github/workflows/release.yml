name: Release

on:
  release:
    types: [published]

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version in version.json
        run: |
          echo "{\"version\":\"${{ github.ref_name }}\",\"buildDate\":\"${{ github.event.release.created_at }}\"}" > version.json

      - name: Create release archive
        run: |
          zip -r source.zip . \
            --exclude=".git/*" \
            --exclude=".github/*" \
            --exclude="node_modules/*" \
            --exclude=".env" \
            --exclude=".env.local" \
            --exclude="*.log" \
            --exclude="update-log.json" \
            --exclude=".update-*" \
            --exclude="*.zip"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} source.zip --clobber
